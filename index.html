<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>810browser Web Edition</title>
    <style>
        /* 全体レイアウト */
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; overflow: hidden; background: #202124; }
        
        /* 認証画面・規約画面 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .modal { background: white; padding: 30px; border-radius: 12px; text-align: center; max-width: 450px; width: 90%; }
        input[type="password"] { padding: 12px; width: 80%; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; margin: 15px 0; outline: none; }
        .btn-green { background: #333; color: #00FF00; border: 2px solid #00FF00; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* ブラウザUI */
        #browser-container { display: none; height: 100vh; flex-direction: column; }
        
        /* タブバー */
        .tab-bar { background: #3c4043; display: flex; padding: 8px 8px 0; gap: 4px; overflow-x: auto; }
        .tab { background: #202124; color: white; padding: 8px 15px; border-radius: 8px 8px 0 0; font-size: 12px; min-width: 100px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: none; }
        .tab.active { background: #f1f3f4; color: #202124; }
        .close-tab { margin-left: 8px; font-weight: bold; cursor: pointer; }
        .add-tab { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding-bottom: 5px; }

        /* ツールバー */
        .toolbar { background: #f1f3f4; padding: 8px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #ccc; }
        .nav-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #5f6368; }
        #url-input { flex-grow: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid #dfe1e5; outline: none; }

        /* コンテンツエリア */
        .content-area { flex-grow: 1; position: relative; background: white; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; display: none; }
        iframe.active { display: block; }
    </style>
</head>
<body>

<div id="site-lock" class="overlay">
    <div class="modal" style="border: 2px solid #00FF00; background: #000; color: #00FF00;">
        <h2>810browser - SYSTEM LOCK</h2>
        <input type="password" id="site-pass" placeholder="Password..." onkeydown="if(event.key==='Enter') verifyPass()">
        <br>
        <button class="btn-green" onclick="verifyPass()">UNLOCK</button>
        <p id="msg" style="color: red;"></p>
    </div>
</div>

<div id="browser-container">
    <div class="tab-bar" id="tab-bar">
        <button class="add-tab" onclick="addNewTab()">＋</button>
    </div>
    
    <div class="toolbar">
        <button class="nav-btn" onclick="history.back()">←</button>
        <button class="nav-btn" onclick="reloadTab()">↻</button>
        <input type="text" id="url-input" placeholder="検索ワードまたはURLを入力..." onkeydown="if(event.key==='Enter') navigate()">
        <button class="nav-btn" onclick="navigate()">🚀</button>
    </div>

    <div class="content-area" id="content-area">
        </div>
</div>

<script>
    let tabCount = 0;
    let activeTabId = null;

    // 認証
    function verifyPass() {
        const p = document.getElementById("site-pass").value;
        if(p === "0521") {
            document.getElementById("site-lock").style.display = "none";
            document.getElementById("browser-container").style.display = "flex";
            addNewTab(); // 最初のタブを開く
        } else {
            document.getElementById("msg").innerText = "ACCESS DENIED";
        }
    }

    // タブ追加機能
    function addNewTab() {
        tabCount++;
        const tabId = `tab-${tabCount}`;
        
        // タブボタン作成
        const tabBar = document.getElementById("tab-bar");
        const addBtn = document.querySelector(".add-tab");
        const newTab = document.createElement("div");
        newTab.className = "tab";
        newTab.id = `btn-${tabId}`;
        newTab.innerHTML = `<span>New Tab</span><span class="close-tab" onclick="closeTab(event, '${tabId}')">×</span>`;
        newTab.onclick = () => switchTab(tabId);
        tabBar.insertBefore(newTab, addBtn);

        // iframe作成
        const contentArea = document.getElementById("content-area");
        const newIframe = document.createElement("iframe");
        newIframe.id = tabId;
        newIframe.src = "https://www.google.com/search?igu=1"; // 初期ページ
        contentArea.appendChild(newIframe);

        switchTab(tabId);
    }

    // タブ切り替え
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));

        document.getElementById(`btn-${tabId}`).classList.add('active');
        const activeIframe = document.getElementById(tabId);
        activeIframe.classList.add('active');
        
        activeTabId = tabId;
        // URLバーを更新
        document.getElementById("url-input").value = activeIframe.src.includes("google") ? "" : activeIframe.src;
    }

    // タブ削除
    function closeTab(event, tabId) {
        event.stopPropagation();
        const tabBtn = document.getElementById(`btn-${tabId}`);
        const iframe = document.getElementById(tabId);
        
        tabBtn.remove();
        iframe.remove();

        if (activeTabId === tabId) {
            const remainingTabs = document.querySelectorAll('.tab');
            if (remainingTabs.length > 0) {
                switchTab(remainingTabs[remainingTabs.length - 1].id.replace('btn-', ''));
            } else {
                addNewTab();
            }
        }
    }

    // 検索・移動機能
    function navigate() {
    let val = document.getElementById("url-input").value;
    if (!val) return;

    let targetUrl = val;

    // 1. YouTubeのURLをチェックして「埋め込み用」に変換する
    if (val.includes("youtube.com/watch?v=")) {
        const videoId = val.split("v=")[1].split("&")[0];
        targetUrl = `https://www.youtube.com/embed/${videoId}`;
    } else if (val.includes("youtu.be/")) {
        const videoId = val.split("youtu.be/")[1].split("?")[0];
        targetUrl = `https://www.youtube.com/embed/${videoId}`;
    } 
    // 2. 普通の検索ワードならDuckDuckGoへ
    else if (!val.startsWith("http")) {
        targetUrl = `https://duckduckgo.com/?q=${encodeURIComponent(val)}&kp=-2&kl=jp-jp`;
    }

    const activeIframe = document.getElementById(activeTabId);
    activeIframe.src = targetUrl;
    
    // タブ名を更新
    document.querySelector(`#btn-${activeTabId} span`).innerText = val.substring(0, 10);
}
</script>

</body>
</html>
